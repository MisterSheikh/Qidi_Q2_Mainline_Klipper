#  Q2

[gcode_macro PRINTER_PARAM]
variable_max_x_position: 270.0
variable_max_y_position: 270.0
variable_max_z_position: 260.0
variable_clear_x_position :88.0
variable_clear_y_position :287.0
gcode:

[gcode_macro _Z_CLEARANCE]
description: Lower the bed to give some clearance
gcode:
    {% set current_z_height = printer.toolhead.position.z %}
    {% set max_z_height = printer.toolhead.axis_maximum.z %}
    {% set target_z_height = current_z_height + params.DISTANCE|default(5)|float %}

    G90                                                                                                            ; Absolute positioning
    G1 Z { [target_z_height, max_z_height]|min }

[gcode_macro _CG28]
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}

[gcode_macro save_zoffset]
gcode:
    {% if printer.gcode_move.homing_origin.z < 0.5 %}
       SAVE_VARIABLE VARIABLE=z_offset VALUE={printer.gcode_move.homing_origin.z}
    {% endif %}

[gcode_macro set_zoffset]        
gcode:
    {% set z = printer.save_variables.variables.z_offset|default(0) %}
    SET_GCODE_OFFSET Z={z} MOVE=0


[gcode_macro CLEAR_NOZZLE]
gcode:
    {% set hotendtemp = params.HOTEND|default(250)|int %}
    MOVE_TO_TRASH
    M400
    M109 S{hotendtemp}
#    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={hotendtemp-20}
    G92 E0
    G1 E5 F80
    G92 E0
    G1 E40 F300
    G92 E0
    G1 E-2 F200
    M400
    M106 S255
    G4 P1000
    M104 S140
    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM={hotendtemp-30}

    M204 S5000
        G1 X103 F5000
        G1 X90 F5000
        G1 X103 F5000
        G1 X90 F5000
        G1 X103 F5000
        G1 X90 F5000
        G1 X103 F5000
        G1 X90 F5000
        G1 X103 F5000
        G1 X90 F5000

        G1 X114 F5000
        G1 X100 F5000
        G1 X114 F5000
        G1 X100 F5000
        G1 X114 F5000
        G1 X100 F5000
        G1 X114 F5000
        G1 X100 F5000
        G1 X114 F5000
        G1 X100 F5000
        G1 X114 F5000
        G1 X100 F5000
        G1 X114 F5000
        G1 X100 F5000

        G1 X103 F5000
        G1 X90 F5000
        G1 X103 F5000
        G1 X90 F5000
        G1 X103 F5000
        G1 X90 F5000
        G1 X103 F5000
        G1 X90 F5000
        G1 X103 F5000
        G1 X90 F5000

    
    G1 X125 F15000
    
    G1 X130 Y280 F6000
    G1 Z-0.2 F600

    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM=150
    M106 S255
    G2 I0.5 J0.5 F600
    G2 I0.5 J0.5 F600
    G2 I0.5 J0.5 F600
    G1 X140 F200
    G1 Y281 F200
    G1 X130 F200
    G1 Y283 F200
    G1 X140 F200

    G2 I0.5 J0.5 F600
    G2 I0.5 J0.5 F600
    G2 I0.5 J0.5 F600

    G1 Z0.2
    G1 X180 F12000
    G1 Z-1.5
    G1 X164 F12000
    G1 X180 F12000
    G1 X164 F12000
    G1 X180 F12000
    G1 X164 F12000
    G1 X180 F12000
    G1 X164 F12000
    M400
    M118 Nozzle cleared
    G1 Z30 F900
    G1 Y10 F18000
    G1 X260 F18000
    M106 S0

[gcode_macro SHAKE_OOZE]
gcode:
    MOVE_TO_TRASH
    M204 S2000
    M400
    G4 P500
    G91 
    {% for y in range(1,14) %}
        G1 Y-1 F20000
#        G4 P50
        G1 Y1 F20000
#       G4 P50
    {% endfor %}
    G90

[gcode_macro MOVE_TO_TRASH]
gcode:
#    _CG28
    
    {% if "xy" not in printer.toolhead.homed_axes %}
        G28 X Y
    {% endif %}
    M204 S5000
    {% if (printer.gcode_move.position.y) > 270 %}
        {% if (printer.gcode_move.position.x) > 112 or (printer.gcode_move.position.x) < 85 %}
            G1 Y270 F20000
            G1 X85 F20000
            G1 Y270 F20000
            G1 Y287.5 F3000
        {% endif %}
        G1 X85 F20000
        G1 Y287.5 F3000
    {% else %}
        G1 X85 F20000
        G1 Y260 F20000
        G1 Y287.5 F3000
    {% endif %}

[gcode_macro EXTRUSION_AND_FLUSH]
gcode:
    {% set hotendtemp = params.HOTEND|int %}
    MOVE_TO_TRASH
    M109 S{hotendtemp}
    M83
    {% for i in range(4) %}
        G1 X{85 + i % 2 * 3} F5000
        {% for j in range(1,6) %}
            G1 E9 F300
            G1 E1 F50
        {% endfor %}
    {% endfor %}
    G1 E-1 F1800
    M400
    M106 S255
    M400
    G4 P5000
    CLEAR_OOZE
    CLEAR_FLUSH
    MOVE_TO_TRASH
    M106 S0

[gcode_macro PRINT_START]
gcode:
    DISABLE_ALL_SENSOR
    CLEAR_PAUSE
    
    {% set bedtemp = params.get('BED') | int %}
    {% set hotendtemp = params.get('HOTEND') | int %}
    {% set chambertemp = params.get('CHAMBER', 0) | int %}
    {% set extruder = params.EXTRUDER|default(0)|int %}

    M104 S0
    M140 S{bedtemp}    
    M141 S{chambertemp}    
    G28   
    SET_GCODE_OFFSET Z=0 MOVE=0

    CLEAR_NOZZLE HOTEND={hotendtemp}

    # Wait for bed to heat up
    {% if bedtemp !=0 %}
      TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={bedtemp * 0.95} MAXIMUM={bedtemp * 1.05}
    {% endif %}
    # Ensure that nozzle is properly heated up for probing
    M109 S140
    M400

    # Move nozzle to center of bed for tap
    G90
    G1 X135 Y135 F7800
    # Tap and home z via PROBE command
    PROBE
    # Adjust for z tilt
    Z_TILT_ADJUST

    # Calibrate an adaptive bed mesh with klippers built-in adaptive meshing
    BED_MESH_CALIBRATE PROFILE=adaptive ADAPTIVE=1

    # Move to corner and wait for hotend to heat up to print temp before printing
    G0 Z30 F600
    G0 X260 Y5 F6000
    M109 S{hotendtemp}
    M204 S10000

[gcode_macro ENABLE_ALL_SENSOR]
gcode:
    SET_FILAMENT_SENSOR SENSOR=filament_switch_sensor ENABLE=1

[gcode_macro DISABLE_ALL_SENSOR]
gcode:
    SET_FILAMENT_SENSOR SENSOR=filament_switch_sensor ENABLE=0


[gcode_macro M84]
rename_existing:M84.1
gcode:
    M84.1
	SET_STEPPER_ENABLE STEPPER=stepper_x enable=0
	SET_STEPPER_ENABLE STEPPER=stepper_y enable=0
	SET_STEPPER_ENABLE STEPPER=stepper_z enable=0
    SET_STEPPER_ENABLE STEPPER=stepper_z1 enable=0
	SET_STEPPER_ENABLE STEPPER=extruder enable=0
	
[delayed_gcode PRINTER_INIT]
initial_duration:0.2
gcode:
	# SET_STEPPER_ENABLE STEPPER=stepper_z enable=1
    # SET_STEPPER_ENABLE STEPPER=stepper_z1 enable=1
    BED_MESH_CLEAR      
#    DETECT_INTERRUPTION
    DISABLE_ALL_SENSOR


[gcode_macro _HOME_X]
gcode:
    {% set HOME_CUR = 0.9 %}
    {% set driver_config = printer.configfile.settings['tmc2240 stepper_x'] %}
    {% set RUN_CUR = driver_config.run_current %}
    
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={HOME_CUR} 
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={HOME_CUR} 
    G28 X
	SET_TMC_CURRENT STEPPER=stepper_x CURRENT={RUN_CUR}     
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={RUN_CUR} 
    BEEP I=1 DUR=100   
    G91    
    G1 X-10 F3000
    G90

[gcode_macro _HOME_Y]
gcode:
    {% set HOME_CUR = 0.9 %}
    {% set driver_config = printer.configfile.settings['tmc2240 stepper_x'] %}
    {% set RUN_CUR = driver_config.run_current %}
    
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={HOME_CUR} 
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={HOME_CUR} 
    G28 Y
	SET_TMC_CURRENT STEPPER=stepper_x CURRENT={RUN_CUR}     
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={RUN_CUR} 
    BEEP I=1 DUR=100   
    G91    
    G1 Y10 F3000
    G90    

[gcode_macro _HOME_XY]
gcode:   
    _HOME_Y
    _HOME_X
    _HOME_Y

[gcode_macro _HOME_Z_FROM_LAST_PROBE]
gcode:
    {% set z_probed = printer.probe.last_probe_position.z %}
    {% set z_position = printer.toolhead.position[2] %}
    {% set z_actual = z_position - z_probed %}
    SET_KINEMATIC_POSITION Z={z_actual}

[gcode_macro _HOME_Z]
gcode:
    SET_GCODE_OFFSET Z=0  # load cell probes dont need a Z offset
    # position toolhead for homing Z, edit for your printers size
    #G90  # absolute move
    #G1 Y50 X50 F{5 * 60}  # move to X/Y position for homing

    # soft home the z axis to its limit so it can be moved:
    SET_KINEMATIC_POSITION Z={printer.toolhead.axis_maximum[2]}

    # Fast approach and tap
    # PROBE PROBE_SPEED={5 * 60}  # override the speed for faster homing
    PROBE # Probe at normal speed
    _HOME_Z_FROM_LAST_PROBE

    # lift z to 2mm
    G91  # relative move
    G1 Z2 F{5 * 60}

    # probe at standard speed
    PROBE
    _HOME_Z_FROM_LAST_PROBE

    # lift z to 10mm for clearance
    G91  # relative move
    G1 Z10 F600


[homing_override]
axes:xy
gcode: 
    M204 S10000
    M220 S100
    SET_STEPPER_ENABLE STEPPER=extruder enable=0
	{% if 'X' in params and 'Y' not in params %}
        _HOME_X
    {% endif %}

	{% if 'Y' in params and 'X' not in params %}
        _HOME_Y
    {% endif %}

    {% if 'X' in params and 'Y' in params %}
        _HOME_XY
    {% endif %}

    {% if 'X' not in params and  'Y' not in params  %}
        SET_KINEMATIC_POSITION X=100
        SET_KINEMATIC_POSITION Y=100
        SET_KINEMATIC_POSITION Z={printer.toolhead.axis_maximum.z/2}
        G91
        G1 Z5 F600
#        G1 X-5 F2400
#        G1 Y2 F2400
        G4 P500
        _HOME_XY
        G90
        G1 X{printer['gcode_macro PRINTER_PARAM'].max_x_position/2} Y{printer['gcode_macro PRINTER_PARAM'].max_y_position/2} F7800
        M400
        _HOME_Z
    {% endif %}
    M204 S10000   
    G90


[gcode_macro SHAPER_CALIBRATE]
rename_existing: RESHAPER_CALIBRATE
gcode:
    RESHAPER_CALIBRATE FREQ_START=20 FREQ_END=150
    
[gcode_macro PRINT_END]
gcode:
    {% set z_clearance = 50 %}
    M400
    DISABLE_BOX_HEATER
    M141 S0
    M140 S0
    G1 E-3 F1800
    G91
    G0 Z3 F600
    G90
    G0 Y270 F12000
    G0 X90 Y270 F12000
    _Z_CLEARANCE DISTANCE={z_clearance}                                                                             ; Lower bed
    M104 S0
    save_zoffset
    SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout}
    CLEAR_PAUSE
    M106 P2 S0
    M106 P0 S0
    # M106 P3 S0

    M220 S100
    M221 S100
    M84

    DISABLE_ALL_SENSOR
#    SET_GCODE_OFFSET Z=0 MOVE=0
    BED_MESH_CLEAR
    BEEP I=2 DUR=500

[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL_PRINT
gcode:
    {% if "xyz" in printer.toolhead.homed_axes %}
        M204 S10000   
        G90
        {% if (printer.gcode_move.position.z) < 100 %}
        G1 Z100 F600                                       
        {% endif %}
        {% if (printer.gcode_move.position.y) > printer['gcode_macro PRINTER_PARAM'].max_y_position %}
            G1 Y{printer['gcode_macro PRINTER_PARAM'].max_y_position - 50} F6000                                       
        {% endif %}
        G1  X265 Y5 F7800
    {% endif %}
    {% if printer.save_variables.variables.box_count >= 1 and printer.save_variables.variables.enable_box == 1 and printer["box_extras"]%}
        BUFFER_MONITORING ENABLE=0
    {% endif %}
    M400
    save_zoffset
    SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout}

    M106 P2 S0
    M106 P0 S0
    M106 P3 S0
    
    M104 S0
    M140 S0
    M141 S0
    DISABLE_BOX_HEATER

    M220 S100
    M221 S100
    M84
	
    DISABLE_ALL_SENSOR
    SET_GCODE_OFFSET Z=0 MOVE=0
    BED_MESH_CLEAR
    G31
    BEEP I=2 DUR=500

    BASE_CANCEL_PRINT
    CLEAR_LAST_FILE
    M118 Canceled print!

[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
gcode:
    # Parameters
    {% set z = params.Z|default(5)|int %}
    
    {% if printer['pause_resume'].is_paused|int == 0 %}     
        SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=zhop VALUE={z}
        SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=etemp VALUE={printer['extruder'].target}
        SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=efan VALUE={printer["fan_generic cooling_fan"].speed *255}
        SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=echambertemp VALUE={printer['heater_generic chamber'].target}

        DISABLE_ALL_SENSOR
        {% if printer.save_variables.variables.box_count >= 1 and printer["box_extras"] and printer.save_variables.variables.enable_box == 1 %}
            BUFFER_MONITORING ENABLE=0 
        {% endif %}
        SAVE_GCODE_STATE NAME=PAUSE              
        BASE_PAUSE
        {% if printer.extruder.can_extrude %}
            G92 E0
            G1 E-5 F1800
        {% endif %}
        {% if "z" in printer.toolhead.homed_axes and (printer.gcode_move.position.z + z ) < printer['gcode_macro PRINTER_PARAM'].max_z_position %}
            G91
            G1 Z{z} F900
        {% else %}
            SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=zhop VALUE=0
        {% endif %}
        SAVE_GCODE_STATE NAME=PAUSEPARK
        {% if "xy"  in printer.toolhead.homed_axes %}
            G90
            G1 X{printer['gcode_macro PRINTER_PARAM'].clear_x_position} F9000
            G1 Y{printer['gcode_macro PRINTER_PARAM'].clear_y_position} F9000
        {% endif %}
        M104 S0
        SET_IDLE_TIMEOUT TIMEOUT=259200   #72H
        SET_STEPPER_ENABLE STEPPER=extruder enable=0
        {% set slot_sync = printer.save_variables.variables.slot_sync|default("slot-1") %}
        {% if printer['box_stepper ' ~ slot_sync] %}
            SET_STEPPER_ENABLE STEPPER='box_stepper '{slot_sync} enable=0
        {% endif %}
    {% endif %}

[gcode_macro RESUME_PRINT]
variable_zhop: 0
variable_etemp: 0
variable_efan: 0
variable_echambertemp: 0
gcode:
    {% set e = params.E|default(150)|int %}
    {% set tool_change = params.TOOL_CHANGE|default(0)|int %}
    
    
    {% if printer['pause_resume'].is_paused|int == 1 %}
        {% if printer.save_variables.variables.box_count >= 1 and printer.save_variables.variables.enable_box == 1 and printer.save_variables.variables.is_tool_change == 1 and printer["box_extras"]%}
            SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout}
            MOVE_TO_TRASH
            {% if etemp > 0 %}
                M109 S{etemp|int}
            {% endif %}
            M83
            RESTORE_GCODE_STATE NAME=PAUSEPARK MOVE=1 MOVE_SPEED=200                            
            RESTORE_GCODE_STATE NAME=PAUSE MOVE=1 MOVE_SPEED=15
            BASE_RESUME
        {% else %}
            SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout}
            {% if etemp > 0 %}
                M109 S{etemp|int}
            {% endif %}
            {% if printer.save_variables.variables.box_count >= 1 and printer["box_extras"] %} 
                SAVE_VARIABLE VARIABLE=retry_step VALUE=None
            {% endif %}
            M83              
            M106 S{efan}
            {% if echambertemp > 0 %}
                M141 S{echambertemp|int}
            {% endif %}
            G1 X{printer['gcode_macro PRINTER_PARAM'].clear_x_position} F9000
            G1 Y{printer['gcode_macro PRINTER_PARAM'].clear_y_position} F9000
            {% if printer.extruder.can_extrude %}                  
                G91
                G1  E{e} F300
                G90
            {% endif %}
            {% if printer.save_variables.variables.box_count >= 1 and printer.save_variables.variables.enable_box == 1 %} 
                BUFFER_MONITORING ENABLE=1
            {% endif %}
            G1 X{printer['gcode_macro PRINTER_PARAM'].clear_x_position + 20} F15000
            G1 X{printer['gcode_macro PRINTER_PARAM'].clear_x_position} F5000
            G1 X{printer['gcode_macro PRINTER_PARAM'].clear_x_position + 20} F15000
            G1 X{printer['gcode_macro PRINTER_PARAM'].clear_x_position} F5000
            G1 X{printer['gcode_macro PRINTER_PARAM'].clear_x_position + 20} F15000
            G1 X{printer['gcode_macro PRINTER_PARAM'].clear_x_position} F5000
            G1 X{printer['gcode_macro PRINTER_PARAM'].clear_x_position + 20} F15000
            G1 X{printer['gcode_macro PRINTER_PARAM'].clear_x_position} F5000
            G1 Y{printer['gcode_macro PRINTER_PARAM'].clear_y_position - 50} F9000 
            RESTORE_GCODE_STATE NAME=PAUSEPARK MOVE=1 MOVE_SPEED=200                            
            RESTORE_GCODE_STATE NAME=PAUSE MOVE=1 MOVE_SPEED=15
            BASE_RESUME       
            {% if tool_change == 0 %}
                ENABLE_ALL_SENSOR
            {% endif %}
        {% endif %}
    {% endif %}
    

[gcode_macro RESUME]
rename_existing: BASE_RESUME
variable_zhop: 0
variable_etemp: 0
variable_efan: 0
variable_echambertemp: 0
gcode:
    {% if printer['pause_resume'].is_paused|int == 1 %}
        {% if printer.save_variables.variables.box_count >= 1 and printer["box_extras"] %} 
            {% if printer.save_variables.variables.enable_box == 1 %}
                TRY_RESUME_PRINT
            {% else %}
                {% if printer['filament_switch_sensor filament_switch_sensor'].filament_detected == True %}
                    RESUME_PRINT
                {% else %}
                    M118 Please load filament
                {% endif %}
            {% endif %}
        {% else %}
            {% if printer['filament_switch_sensor filament_switch_sensor'].filament_detected == True %}
                RESUME_PRINT
            {% else %}
                M118 Please load filament
            {% endif %}
        {% endif %}
    {% endif %}

[gcode_macro M141]
gcode:
    {% if printer["heater_generic chamber"] is defined %}
        {% set s = params.S|float %}
        SET_HEATER_TEMPERATURE HEATER=chamber TARGET={([s, 65]|min)}
    {% endif %}

[gcode_macro M191]
gcode:
    {% if printer["heater_generic chamber"] is defined %}
        {% set s = params.S|float %}
    
        M141 {% for p in params %}{'%s%s' % (p, params[p])}{% endfor %}  
        {% if s != 0 %}
            TEMPERATURE_WAIT SENSOR="heater_generic chamber" MINIMUM={([s, 65]|min)-2}
        {% endif %}
    {% endif %}
     
[gcode_macro M106]
gcode:
    {% set p = params.P|default(0)|int %}

    {% if p == 2 %}
    {% if params.S is defined %}
        SET_FAN_SPEED FAN=auxiliary_cooling_fan SPEED={(params.S|float / 255.0)}
    {% else %}
        SET_FAN_SPEED FAN=auxiliary_cooling_fan SPEED=1
    {% endif %}
    {% endif %} 

    {% if p == 0 %}
    {% if params.S is defined %}
        SET_FAN_SPEED FAN=cooling_fan SPEED={(params.S|float / 255.0)}
        
    {% else %}
        SET_FAN_SPEED FAN=cooling_fan SPEED=1
    {% endif %}
    {% endif %} 

    {% if p == 3 %}
    {% if params.S is defined %}
        SET_FAN_SPEED FAN=chamber_circulation_fan SPEED={(params.S|float / 255.0)}
    {% else %}
        SET_FAN_SPEED FAN=chamber_circulation_fan SPEED=1
    {% endif %}
    {% endif %} 

    {% if p == 4 %}
        {% if params.S is defined %}
            SET_PIN PIN=Polar_cooler VALUE={1 if (params.S|int / 255) > 0 else 0}
        {% else %}
            SET_PIN PIN=Polar_cooler VALUE=1
        {% endif %}
    {% endif %}

[gcode_macro M107]
gcode:  
    SET_FAN_SPEED FAN=cooling_fan SPEED=0
       
[gcode_macro M0]
gcode:
    PAUSE

[gcode_macro M25]
rename_existing: M9925
gcode:
    PAUSE

[gcode_macro move_screw1]
gcode:
    G1 Z5 F600
    G1 X30 Y32 F12000
    G1 Z0 F300

[gcode_macro move_screw2]
gcode:
    G1 Z5 F600
    G1 X240 Y32 F12000
    G1 Z0 F300
    
[gcode_macro move_screw3]
gcode:
    G1 Z5 F600
    G1 X240 Y242 F12000
    G1 Z0 F300

[gcode_macro move_screw4]
gcode:
    G1 Z5 F600
    G1 X30 Y242 F12000
    G1 Z0 F300


[gcode_macro M109]
rename_existing: M99109
gcode:
    {% set s = params.S|float %}
    
    M104 {% for p in params %}{'%s%s' % (p, params[p])}{% endfor %}
    {% if s != 0 %}
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={s} MAXIMUM={s+1}
    {% endif %}


[gcode_macro M204]
rename_existing: M99204
gcode:
    {% if params.S is defined %}
        {% set s = params.S|float %}
    {% endif %}
    {% if params.P is defined %}
    {% if params.T is defined %}
        {% set s = [params.P|float ,params.T|float] | min %}
    {% endif %}
    {% endif %}

    SET_VELOCITY_LIMIT ACCEL={s}
    SET_VELOCITY_LIMIT ACCEL_TO_DECEL={s/2}

[gcode_macro BEEP]
gcode:
    {% set i = params.I|default(1)|int %}
    {% set dur = params.DUR|default(100)|int %}
    {% set beep = printer.save_variables.variables.beep|default(0) %}

    {% if beep == 1 %}
        {% for iteration in range(i|int) %}
            SET_PIN PIN=beeper VALUE=1
            G4 P{dur}
            SET_PIN PIN=beeper VALUE=0
    		G4 P{dur}
        {% endfor %}
    {% endif %}

[gcode_macro beep_on]
gcode:
    SAVE_VARIABLE VARIABLE=beep VALUE=1

[gcode_macro beep_off]
gcode:
    SAVE_VARIABLE VARIABLE=beep VALUE=0

[gcode_macro LED_ON]
gcode:
    SET_PIN PIN=caselight VALUE=1

[gcode_macro LED_OFF]
gcode:
    SET_PIN PIN=caselight VALUE=0

[gcode_macro HEAT_SOAK_ASA]
description: Heat soak the printer for ASA
gcode:
    # Home
    G28

    # Absolute Positioning and set Z to 6mm
    G90
    G1 Z6 F600

    # Turn on bed and chamber heaters
    M140 S100    
    M141 S60

    # Set auxiliary fan speed to 50%
    SET_FAN_SPEED FAN=auxiliary_cooling_fan SPEED=0.5

    # Turn off motors so they're not on while printer heat soaks
    M84

########################################
#  Filament Macros
########################################
##### TIP FORMING #####
[gcode_macro _TIP_FORM_VARS]
description: Tip forming configuration variables
gcode: # Leave empty

# Step 1 - Ramming
variable_ramming_volume: 16              # Volume in mm^3
variable_ramming_speed: 10               # Speed in mm/s

# Step 2 - Nozzle Separation  
variable_unloading_speed_start: 80       # Fast initial movement mm/s
variable_unloading_speed: 12             # Slow movement to cooling zone mm/s

# Step 3 - Cooling Moves
variable_cooling_tube_position: 26       # Start of cooling tube from nozzle
variable_cooling_tube_length: 16         # Length of cooling moves
variable_initial_cooling_speed: 10       # Initial slow speed mm/s
variable_final_cooling_speed: 40         # Final fast speed mm/s
variable_cooling_moves: 3                # Number of cooling cycles

# Step 4 - Skinnydip (burns off fine hairs)
variable_use_skinnydip: False            # Enable/disable skinnydip
variable_skinnydip_distance: 40          # Reinsertion distance
variable_dip_insertion_speed: 20         # Insertion speed mm/s
variable_dip_extraction_speed: 60        # Extraction speed mm/s
variable_melt_zone_pause: 0              # Pause in melt zone (ms)
variable_cooling_zone_pause: 0           # Pause after dip (ms)

# Step 5 - Final movements
variable_parking_distance: 15            # Distance to park filament
variable_final_eject_distance: 80        # Total distance for full unload

[gcode_macro FILAMENT_UNLOAD]
description: Unload filament with tip forming
gcode:
    {% set EXTRUDER_TEMP = params.TEMP|default(220)|int %}
    {% set EJECT = params.EJECT|default(1)|int %}
    {% set vars = printer['gcode_macro _TIP_FORM_VARS'] %}
    
    SAVE_GCODE_STATE NAME=unload_state
    
    # Heat if needed
    {% if printer.extruder.temperature < EXTRUDER_TEMP %}
        M118 Heating to {EXTRUDER_TEMP}C...
        M109 S{EXTRUDER_TEMP}
    {% endif %}
    
    M118 Forming tip...
    
    G91  # Relative positioning
    M83  # Relative extrusion
    G92 E0
    
    # Step 1 - Ramming
    {% if vars.ramming_volume > 0 %}
        G1 E{vars.ramming_volume / 2} F{vars.ramming_speed / 2 * 60}
        G1 E{vars.ramming_volume / 2} F{vars.ramming_speed * 60}
    {% endif %}
    
    # Step 2 - Nozzle Separation
    # Fast initial retraction to separate from melt zone
    G1 E-15 F{vars.unloading_speed_start * 60}
    
    # Calculate remaining distance to cooling tube
    {% set total_retraction = vars.cooling_tube_position + vars.cooling_tube_length - 15 %}
    {% if total_retraction > 0 %}
        G1 E-{(0.7 * total_retraction)|round(2)} F{vars.unloading_speed * 60}
        G1 E-{(0.2 * total_retraction)|round(2)} F{(0.5 * vars.unloading_speed) * 60}
        G1 E-{(0.1 * total_retraction)|round(2)} F{(0.3 * vars.unloading_speed) * 60}
    {% endif %}
    
    # Step 3 - Cooling Moves
    # Shape the tip by moving back and forth in cooling zone
    {% set speed_inc = (vars.final_cooling_speed - vars.initial_cooling_speed) / (2 * vars.cooling_moves - 1) %}
    {% for move in range(vars.cooling_moves) %}
        {% set speed = vars.initial_cooling_speed + speed_inc * move * 2 %}
        G1 E{vars.cooling_tube_length} F{speed * 60}
        G1 E-{vars.cooling_tube_length} F{(speed + speed_inc) * 60}
    {% endfor %}
    
    # Step 4 - Skinnydip (optional)
    {% if vars.use_skinnydip %}
        G1 E{vars.skinnydip_distance} F{vars.dip_insertion_speed * 60}
        G4 P{vars.melt_zone_pause}
        G1 E-{vars.skinnydip_distance} F{vars.dip_extraction_speed * 60}
        G4 P{vars.cooling_zone_pause}
    {% endif %}
    
    M118 Ejecting filament...
    
    # Step 5 - Final Eject/Park
    {% if EJECT == 1 %}
        # Full eject for filament changes
        G92 E0
        G1 E-{vars.final_eject_distance} F{vars.unloading_speed_start * 60}
    {% else %}
        # Just park at fixed distance
        G92 E0
        G1 E-{vars.parking_distance} F{vars.unloading_speed_start * 60}
    {% endif %}
    
    G92 E0
    M400  # Wait for moves to finish
    
    RESTORE_GCODE_STATE NAME=unload_state
    
    M118 Unload complete!
    M118 Filament unloaded successfully

    M104 S0 ; Turn the hotend off
    SET_STEPPER_ENABLE STEPPER=extruder enable=0                                                               ; Disable extruder stepper

[gcode_macro LOAD_FILAMENT]
description: Loads filament to toolhead
gcode:
  {% set EXTRUDER_TEMP = params.TEMP|default(230)|int %}
  {% set CURRENT_TEMP = printer.extruder.temperature|int %}
  {% if CURRENT_TEMP < EXTRUDER_TEMP %}
    M109 S{EXTRUDER_TEMP}                                                                                          ; heat up the hotend
  {% endif %}
  M83                                                                                                              ; set extruder to relative mode
  G1 E5 F120                                                                                                       ; feed filament
  G1 E5 F300                                                                                                       ; feed filament
  G1 E40 F600                                                                                                      ; feed filament
  G1 E15 F300                                                                                                      ; feed filament
  G1 E15 F120                                                                                                      ; feed filament
  G4 P200                                                                                                          ; pause for a short amount of time
  G1 E10 F90                                                                                                       ; feed filament
  M400                                                                                                             ; wait for moves to finish
  M118 Load Complete!
